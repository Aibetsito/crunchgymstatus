<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crunch Gym Status</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-box">
                <h1 class="brand-name">CRUNCH</h1>
                <p class="subtitle">Fitness Gym Status</p>
            </div>
        </header>

        <main>
            <div class="status-hero" id="status-hero">
                <p class="status-label">CURRENT CLUB STATUS</p>
                <h2 id="current-status">LOADING</h2>
                <p id="time-remaining">--:--</p>

                <div class="hours-info">
                    <h3>Today's Hours:</h3>
                    <p id="today-hours">--</p>
                </div>
            </div>

            <div class="all-hours">
                <h3>Weekly Hours</h3>
                <ul>
                    <li><span class="day">Monday</span> <span class="hours">5:00 AM - 12:00 AM</span></li>
                    <li><span class="day">Tue - Fri</span> <span class="hours">24 Hours (12:00 AM - 12:00 AM)</span>
                    </li>
                    <li><span class="day">Saturday</span> <span class="hours">12:00 AM - 7:00 PM</span></li>
                    <li><span class="day">Sunday</span> <span class="hours">7:00 AM - 7:00 PM</span></li>
                </ul>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
